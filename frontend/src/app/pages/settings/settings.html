<div class="card">
  <h2>Configurações Gerais (planilha "Outros")</h2>
  <div class="form-grid">
    <div><label class="label">Custo de Energia (R$/kWh) <span class="required">*</span></label><input class="input" type="number" required step="0.01" [(ngModel)]="settings.energy_cost_per_kwh"></div>
    <div><label class="label">Custo de Trabalho (R$/h) <span class="required">*</span></label> <input class="input" type="number" required step="0.01" [(ngModel)]="settings.labor_cost_per_hour"></div>
    <div><label class="label">Taxa de Falha (%) <span class="required">*</span></label>        <input class="input" type="number" required step="0.1"  [(ngModel)]="settings.failure_rate"></div>
    <div><label class="label">Markup</label>                                                   <input class="input" type="number" step="0.05" [(ngModel)]="settings.markup"></div>
    <div><label class="label">Taxa Marketplace (0–1) <span class="required">*</span></label>   <input class="input" type="number" required step="0.01" [(ngModel)]="settings.marketplace_fee"></div>
    <div><label class="label">Imposto (0–1) <span class="required">*</span></label>            <input class="input" type="number" required step="0.01" [(ngModel)]="settings.tax"></div>
    <div><label class="label">Taxa Fixa (R$) <span class="required">*</span></label>           <input class="input" type="number" required step="0.5"  [(ngModel)]="settings.fixed_fee"></div>
    <div><label class="label">Moeda <span class="required">*</span></label>                    <input class="input" required [(ngModel)]="settings.currency"></div>
  </div>
  <button class="btn btn-primary" style="margin-top:16px;" (click)="save()" [disabled]="savingSettings">{{ savingSettings ? 'Salvando…' : 'Salvar' }}</button>
</div>

<div class="card" style="margin-top:24px;">
  <h2>Impressoras</h2>
  <div class="form-grid">
    <div><label class="label">Nome <span class="required">*</span></label>          <input class="input" required [(ngModel)]="newPrinter.name"></div>
    <div><label class="label">Fabricante</label>                                    <input class="input" [(ngModel)]="newPrinter.manufacturer"></div>
    <div><label class="label">Preço (R$) <span class="required">*</span></label>    <input class="input" type="number" required [(ngModel)]="newPrinter.price"></div>
    <div><label class="label">Depreciação (h) <span class="required">*</span></label><input class="input" type="number" required [(ngModel)]="newPrinter.depreciation_hours"></div>
    <div><label class="label">Manutenção (R$)</label>                               <input class="input" type="number" [(ngModel)]="newPrinter.maintenance_cost"></div>
    <div><label class="label">Consumo (kWh/h) <span class="required">*</span></label><input class="input" type="number" required step="0.01" [(ngModel)]="newPrinter.avg_power_kwh"></div>
  </div>
  <div style="margin-top:12px; display:flex; gap:12px;">
    <button class="btn btn-primary" (click)="savePrinter()" [disabled]="busyPrinter">
      {{ busyPrinter ? 'Salvando…' : (editingPrinterId != null ? 'Salvar alterações' : '+ Adicionar') }}
    </button>
    <button class="btn" *ngIf="editingPrinterId != null" (click)="cancelPrinter()">Cancelar</button>
  </div>
  <table class="table" style="margin-top:16px;">
    <thead><tr><th>Nome</th><th>Fabricante</th><th>Preço</th><th>Dep. (h)</th><th>Dep. R$/h</th><th>kWh/h</th><th>Ações</th></tr></thead>
    <tbody>
      <tr *ngFor="let p of printers">
        <td>{{p.name}}</td><td>{{p.manufacturer}}</td><td>R$ {{p.price | number:'1.2-2'}}</td>
        <td>{{p.depreciation_hours}}</td><td>R$ {{p.depreciation_per_hour | number:'1.4-4'}}</td>
        <td>{{p.avg_power_kwh}}</td>
        <td class="actions"><button class="btn btn-edit btn-icon" title="Editar" (click)="editPrinter(p)">✏️</button>
          <button class="btn btn-danger btn-icon" title="Excluir" (click)="delPrinter(p.id)" [disabled]="removingPrinter[p.id!]">{{ removingPrinter[p.id!] ? '…' : '🗑️' }}</button>
        </td>
      </tr>
      <tr *ngIf="!printers.length"><td colspan="7" class="muted" style="text-align:center;padding:16px;">Nenhuma impressora cadastrada.</td></tr>
    </tbody>
  </table>
</div>
